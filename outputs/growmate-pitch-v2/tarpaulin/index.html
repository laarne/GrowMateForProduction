<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrowMate — Startup Booth Tarpaulin 4x6ft</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Lora:ital,wght@0,600;1,500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Outfit', sans-serif; }

    /* ── Tarpaulin canvas: 4:6 ratio at 1200×1800px ── */
    .tarp {
      width: 1200px;
      height: 1800px;
      background: linear-gradient(160deg, #09170e 0%, #0d2616 50%, #09170e 100%);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #fff;
    }

    /* ── Glowing Nature Backdrops ── */
    .glow-bg {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
    }
    .glow-center {
      position: absolute; width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(76,175,80,0.18) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .glow-top {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(250,204,21,0.06) 0%, transparent 70%);
      top: -200px; left: 50%; transform: translateX(-50%);
    }

    /* ── TOP SECTION (Stop Layer: 5-Second Grabber) ── */
    .top-section {
      padding: 80px 80px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .brand-row {
      display: flex; align-items: center; gap: 16px; margin-bottom: 36px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 24px; border-radius: 999px;
    }
    .brand-logo {
      width: 36px; height: 36px; border-radius: 8px;
    }
    .brand-name {
      font-size: 24px; font-weight: 800; letter-spacing: -0.5px;
    }
    .headline {
      font-size: 84px; font-weight: 900; line-height: 1.05;
      letter-spacing: -2px; margin-bottom: 20px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }
    .subhead {
      font-size: 36px; font-weight: 700;
      color: #facc15; /* Sunlight Yellow Accent */
      letter-spacing: 2px; text-transform: uppercase;
      text-shadow: 0 2px 20px rgba(250,204,21,0.2);
    }

    /* ── MIDDLE SECTION (Hero Visual & App Focus) ── */
    .hero-section {
      display: flex; justify-content: center; align-items: center;
      position: relative; z-index: 2;
      flex-grow: 1; padding: 20px 0;
    }
    .phone-wrapper {
      position: relative;
      width: 480px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8), 0 0 80px rgba(76,175,80,0.25);
      border-radius: 44px;
    }
    .phone-img {
      width: 100%; display: block; border-radius: 44px;
    }

    /* ── UNDERSTAND LAYER (Minimalist Indicators) ── */
    .indicators-strip {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 30px; padding: 40px 80px 60px;
      position: relative; z-index: 2;
    }
    .indicator-card {
      background: rgba(255,255,255,0.02);
      border: 1.5px solid rgba(255,255,255,0.06);
      border-radius: 28px; padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(20px);
    }
    .ind-icon {
      font-size: 40px; margin-bottom: 12px; display: block;
    }
    .ind-label {
      font-size: 20px; font-weight: 800; color: #fff;
      margin-bottom: 4px;
    }
    .ind-sub {
      font-size: 14px; color: rgba(255,255,255,0.50);
      font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ── BOTTOM SECTION (Act Layer & Scan Area) ── */
    .bottom-cta {
      background: linear-gradient(135deg, #1b3d24 0%, #0d2616 100%);
      border-top: 2px solid rgba(255,255,255,0.08);
      padding: 50px 80px 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 2;
    }
    .cta-left {
      display: flex; flex-direction: column; gap: 14px;
    }
    .cta-title {
      font-size: 44px; font-weight: 900; color: #fff; line-height: 1.1;
    }
    .cta-pills {
      display: flex; gap: 12px; align-items: center;
    }
    .cta-pill-yellow {
      background: #facc15; color: #0d2616;
      font-size: 14px; font-weight: 800; padding: 8px 20px;
      border-radius: 999px; box-shadow: 0 4px 20px rgba(250,204,21,0.3);
    }
    .cta-pill-green {
      background: rgba(76,175,80,0.15); color: #81c784;
      font-size: 14px; font-weight: 700; padding: 8px 20px;
      border-radius: 999px; border: 1.5px solid rgba(76,175,80,0.3);
    }
    .website {
      font-size: 18px; color: rgba(255,255,255,0.50); font-weight: 500;
    }

    .cta-right {
      display: flex; align-items: center; gap: 28px;
    }
    .qr-desc {
      text-align: right;
    }
    .qr-headline {
      font-size: 20px; font-weight: 800; color: #fff; margin-bottom: 4px;
    }
    .qr-subtext {
      font-size: 14px; color: rgba(255,255,255,0.60);
    }
    .qr-frame {
      background: #fff; padding: 12px; border-radius: 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
    }
    .qr-frame img {
      width: 140px; height: 140px; display: block;
    }

    /* Bottom Leafy Accent Bar */
    .bottom-accent {
      height: 12px; background: #4caf50; z-index: 2;
    }
  </style>
</head>
<body>

<div class="tarp">

  <!-- Glowing Backdrop Orbs -->
  <div class="glow-bg">
    <div class="glow-center"></div>
    <div class="glow-top"></div>
  </div>

  <!-- TOP SECTION (Stop Layer) -->
  <div class="top-section">
    <div class="brand-row">
      <img src="../growmate-logo.png" alt="GrowMate Logo" class="brand-logo" onerror="this.style.display='none';" />
      <span class="brand-name">GrowMate</span>
    </div>
    <h1 class="headline">Your Plants’ Best Friend.</h1>
    <p class="subhead">Snap. Identify. Grow.</p>
  </div>

  <!-- HERO SECTION (App Focus centerpiece) -->
  <div class="hero-section">
    <div class="phone-wrapper">
      <img src="../app-slide-05.png" alt="GrowMate App UI Mockup" class="phone-img" />
    </div>
  </div>

  <!-- MIDDLE SECTION (Understand Layer - 5s Read) -->
  <div class="indicators-strip">
    
    <div class="indicator-card">
      <span class="ind-icon">🎯</span>
      <div class="ind-label">90%+ Accuracy</div>
      <div class="ind-sub">ID Confidence</div>
    </div>

    <div class="indicator-card">
      <span class="ind-icon">🌿</span>
      <div class="ind-label">38,000+ Species</div>
      <div class="ind-sub">Pl@ntNet DB</div>
    </div>

    <div class="indicator-card">
      <span class="ind-icon">🤖</span>
      <div class="ind-label">24/7 AI Expert</div>
      <div class="ind-sub">Leafy Advisor</div>
    </div>

  </div>

  <!-- BOTTOM SECTION (Act Layer) -->
  <div class="bottom-cta">
    <div class="cta-left">
      <div class="cta-title">Scan to Download</div>
      <div class="cta-pills">
        <span class="cta-pill-yellow">🎁 Free Forever for Buyers</span>
        <span class="cta-pill-green">📦 Android APK Ready</span>
      </div>
      <div class="website">🌐 plantita.online</div>
    </div>
    <div class="cta-right">
      <div class="qr-desc">
        <div class="qr-headline">Try GrowMate Today</div>
        <div class="qr-subtext">Direct download package</div>
      </div>
      <div class="qr-frame">
        <!-- Direct QR code to plantita.online -->
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://plantita.online&color=09170e&bgcolor=ffffff&margin=5" alt="QR Code" />
      </div>
    </div>
  </div>

  <!-- Bottom Accent Strip -->
  <div class="bottom-accent"></div>

</div>

</body>
</html>
